spring.application.name=hotel_management_system

stripe.secretKey=YOUR_SECRET_KEY
stripe.secretWebHookKey = YOUR_SECRET_W_KEY

spring.ai.openai.api-key=YOUR_API_KEY
spring.ai.openai.chat.options.model=gpt-4o
spring.ai.openai.chat.options.temperature=0.7

spring.datasource.url=jdbc:postgresql://localhost:5432/dehotel
spring.datasource.username=postgres
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

security.jwt.secret-key=YOUR_SECRET_KEY
# 1h in millisecond = 3600000
security.jwt.expiration-time=3600000

